  <h1>Calculadora de Promedio Ponderado</h1>
  <p style="padding: 0 20px;">Ingresa cada nota junto con el porcentaje que representa (ej: prueba 1 = 30%). La suma de porcentajes debería llegar a 100%.</p>

  <div id="lista-notas"></div>
  <div style="padding: 0 20px;">
    <button id="btn-agregar">+ Agregar nota</button>
  </div>

  <h2>Suma de porcentajes: <span id="suma-porcentajes">0</span>%</h2>
