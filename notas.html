<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Notas</title>
  <link rel="stylesheet" href="css/estilos.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="top-header">
    <div class="logo">Santo Tomás</div>
    <div class="subtitulo">Portal del Estudiante</div>
  </header>

  <nav>
    <ul class="menu">
      <li><a href="#" id="btn-modo-oscuro"></a></li>
      <li><a href="index.html">🏠 Inicio</a></li>
      <li><a href="horario.html">📅 Horario</a></li>
      <li><a href="calendario.html">🗓️ Calendario</a></li>
      <li><a href="perfil.html">👤 Perfil</a></li>
      <li><a href="#" id="btn-logout">🚪 Cerrar sesión</a></li>
    </ul>
  </nav>

  <h1>Mis Notas por Asignatura</h1>

  <div style="padding: 0 20px; margin-bottom: 20px;">
    <input type="text" id="input-asignatura" list="lista-asignaturas" placeholder="Asignatura (ej: Matemáticas)" onfocus="this.select()">
    <button type="button" id="btn-mic-asignatura" class="boton-mic" title="Dictar asignatura">🎤</button>
    <datalist id="lista-asignaturas"></datalist>
    <input type="number" id="input-valor" placeholder="Nota" min="1" max="7" step="0.1" onfocus="this.select()" style="width: 70px;">
    <input type="number" id="input-porcentaje" placeholder="%" min="0" max="100" step="1" onfocus="this.select()" style="width: 70px;">
    <button id="btn-agregar">+ Agregar nota</button>
  </div>

  <div id="contenedor-asignaturas"></div>

  <div class="contenedor-grafico">
    <canvas id="grafico-notas"></canvas>
  </div>

  <hr style="margin: 20px;">

  <h1>¿Qué nota necesito para aprobar?</h1>
 <div style="padding: 0 20px;">
    <label>Asignatura:
      <select id="select-asignatura-necesaria"></select>
    </label>
    <br><br>
    <label>Nota mínima para aprobar: 
      <input type="number" id="input-nota-minima" value="5.3" step="0.1" onfocus="this.select()">
    </label>
    <br><br>
    <label>Porcentaje de la evaluación que falta: 
      <input type="number" id="input-porcentaje-faltante" step="1" onfocus="this.select()">%
    </label>
  </div>

  <h2 style="padding: 0 20px;" id="resultado-necesario"></h2>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/utilidades.js"></script>
  <script src="js/notas.js"></script>
  <script>
    activarDictado('btn-mic-asignatura', 'input-asignatura');
  </script>
</body>
</html>
