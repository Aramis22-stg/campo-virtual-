<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Horario</title>
  <link rel="stylesheet" href="css/estilos.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
  <header class="top-header">
    <div class="logo">Santo Tomás</div>
    <div class="subtitulo">Portal del Estudiante</div>
  </header>

  <nav>
    <ul class="menu">
      <li><a href="index.html">🏠 Inicio</a></li>
      <li><a href="notas.html">🧮 Notas</a></li>
      <li><a href="calendario.html">🗓️ Calendario</a></li>
      <li><a href="#" id="btn-logout">🚪 Cerrar sesión</a></li>
    </ul>
  </nav>

  <h1>Mi Horario</h1>

  <div style="padding: 0 20px; margin-bottom: 15px;">
    🔍 <input type="text" id="input-buscar" placeholder="Buscar por ramo, día o sala..." onfocus="this.select()" style="width: 300px; padding: 6px;">
  </div>

  <div style="padding: 0 20px; margin-bottom: 15px;">
    <select id="input-dia">
      <option value="Lunes">Lunes</option>
      <option value="Martes">Martes</option>
      <option value="Miércoles">Miércoles</option>
      <option value="Jueves">Jueves</option>
      <option value="Viernes">Viernes</option>
      <option value="Sábado">Sábado</option>
      <option value="Domingo">Domingo</option>
    </select>
    <input type="text" id="input-hora" placeholder="Ej: 18:40 - 20:00" onfocus="this.select()">
    <input type="text" id="input-ramo" placeholder="Nombre del ramo" onfocus="this.select()">
    <input type="text" id="input-sala" placeholder="Sala" onfocus="this.select()">
    <button id="btn-agregar-ramo">+ Agregar clase</button>
  </div>

  <table id="tabla-horario" border="1">
    <thead>
      <tr>
        <th>Día</th>
        <th>Hora</th>
        <th>Ramo</th>
        <th>Sala</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody id="cuerpo-horario"></tbody>
  </table>
  <p id="sin-resultados" style="padding: 0 20px; display: none;">No se encontraron clases que coincidan con tu búsqueda.</p>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/horario.js"></script>
</body>
</html>
