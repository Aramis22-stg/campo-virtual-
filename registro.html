<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Portal del Estudiante</title>
  <link rel="stylesheet" href="css/estilos.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
  <header class="top-header">
    <div class="logo">Santo Tomás</div>
    <div class="subtitulo">Portal del Estudiante</div>
  </header>

  <h1>Crear Cuenta</h1>

  <div style="padding: 0 20px; max-width: 400px;">
    <label>Correo electrónico:</label><br>
    <input type="email" id="input-correo" style="width: 100%; padding: 8px; margin-bottom: 12px;"><br>

    <label>Contraseña:</label><br>
    <input type="password" id="input-clave" style="width: 100%; padding: 8px; margin-bottom: 12px;"><br>

    <button id="btn-registrar">Crear Cuenta</button>

    <p id="mensaje" style="margin-top: 15px;"></p>

    <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/registro.js"></script>
</body>
</html>
